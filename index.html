        }

        .apple-btn-primary {

            border: none;
            border-radius: 980px;

            font-weight: 600;
            font-size: 17px;

            background: transparent;

            border: none;
            border-radius: 980px;
            padding: 12px 24px;
            font-weight: 600;

        .apple-section {
            padding: 100px 0;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        .hologram-glow {
            box-shadow: 0 0 40px rgba(0, 113, 227, 0.15);
        }

        @keyframes core-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .animate-core-glow {
            animation: core-glow 2s ease-in-out infinite;
        }

        @keyframes data-flow {
            to { stroke-dashoffset: -20; }
        }
        .animate-data-flow {
            stroke-dasharray: 8 4;
            animation: data-flow 1s linear infinite;
        }

        @keyframes memory-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-memory-shimmer {
            animation: memory-shimmer 3s ease-in-out infinite;
        }

        /* Apple-style smooth transitions */
        * {
            transition-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1);
        }
